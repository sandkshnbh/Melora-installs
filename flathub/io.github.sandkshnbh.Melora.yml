app-id: io.github.sandkshnbh.Melora
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: melora-wrapper.sh
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home
  - --socket=fallback-x11
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: melora
    buildsystem: simple
    build-commands:
      - mkdir -p /app/bin
      - mkdir -p /app/share/melora
      - install -D main.py /app/share/melora/main.py
      - cp -r src /app/share/melora/
      - cp -r assets /app/share/melora/
      - install -D flathub/melora-wrapper.sh /app/bin/melora-wrapper.sh
      - install -D flathub/io.github.sandkshnbh.Melora.desktop /app/share/applications/io.github.sandkshnbh.Melora.desktop
      - install -D flathub/io.github.sandkshnbh.Melora.metainfo.xml /app/share/metainfo/io.github.sandkshnbh.Melora.metainfo.xml
      - install -D assets/sk.png /app/share/icons/hicolor/512x512/apps/io.github.sandkshnbh.Melora.png
    sources:
      - type: git
        url: https://github.com/sandkshnbh/Melora-installs.git
        branch: main
